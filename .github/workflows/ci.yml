name: CI
on:
  push:
    branches: [main]
    paths: ['content/**', 'config/**', 'scripts/**', 'js/**', '*.html', 'assets/**', 'robots.txt']
  pull_request:
    branches: [main]
    paths: ['content/**', 'config/**', 'scripts/**', 'js/**', '*.html', 'assets/**', 'robots.txt']
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: node scripts/validate.mjs
      - run: node scripts/build.mjs
