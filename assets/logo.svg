<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Modern Gradient for the Logo Mark -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />   <!-- Indigo -->
      <stop offset="50%" stop-color="#6366f1" />  <!-- Violet-Blue -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan/Teal -->
    </linearGradient>
  </defs>

  <!-- Background Circle (Subtle glow/container) -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round" opacity="0.15" />
  
  <!-- Outer Interlocking Circle (The 'Q' loop) -->
  <circle cx="46" cy="46" r="28" fill="none" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" />

  <!-- The tail of the 'Q' interlocking into the 'R' leg -->
  <path d="M 64 64 L 80 80" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" />

  <!-- R's Inner Monogram Shape -->
  <path d="M 40 32 H 58 C 65 32 68 36 68 41 C 68 46 64 50 58 50 H 40 M 54 50 L 70 68" fill="none" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
</svg>
