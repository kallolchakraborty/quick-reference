<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="ai-bytes-logo">
  <defs>
    <!-- Brand Gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A65" />
      <stop offset="50%" stop-color="#E95420" />
      <stop offset="100%" stop-color="#BF360C" />
    </linearGradient>

    <!-- Glowing effect for lines and active nodes -->
    <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur1" />
      <feGaussianBlur stdDeviation="1.2" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Static connecting lines */
    .conn-line {
      stroke: #E95420;
      stroke-width: 0.5;
      opacity: 0.15;
    }
    html.dark .conn-line {
      opacity: 0.25;
    }

    /* Signal flow animations - single flowing neon packets */
    @keyframes flow-right {
      0% {
        stroke-dashoffset: 60;
      }
      100% {
        stroke-dashoffset: 0;
      }
    }
    
    .signal-flow-fast {
      stroke: #FF8A65;
      stroke-width: 1.0;
      fill: none;
      stroke-dasharray: 4, 36;
      animation: flow-right 1.4s linear infinite;
      filter: url(#glow-heavy);
      opacity: 0.9;
    }
    
    .signal-flow-slow {
      stroke: #E95420;
      stroke-width: 0.9;
      fill: none;
      stroke-dasharray: 3, 45;
      animation: flow-right 2.0s linear infinite;
      filter: url(#glow-heavy);
      opacity: 0.85;
    }

    /* Node Core Pulse */
    @keyframes core-pulse {
      0%, 100% {
        transform: scale(0.9);
        filter: drop-shadow(0 0 1px rgba(233, 84, 32, 0.4));
      }
      50% {
        transform: scale(1.15);
        filter: drop-shadow(0 0 6px rgba(233, 84, 32, 0.85));
      }
    }
    
    .node {
      fill: url(#brand-grad);
      transform-origin: center;
      animation: core-pulse 2.5s ease-in-out infinite;
    }

    .node-core {
      fill: #FFFFFF;
      opacity: 0.95;
    }

    /* Expanding Ripples (Figma neural-network style ping wave) */
    @keyframes ripple-out {
      0% {
        r: 3px;
        opacity: 0.8;
        stroke-width: 1.2;
      }
      50% {
        opacity: 0.4;
      }
      100% {
        r: 12px;
        opacity: 0;
        stroke-width: 0.3;
      }
    }

    .ripple {
      fill: none;
      stroke: #FF7A50;
      animation: ripple-out 2.5s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
      pointer-events: none;
    }

    /* Animations delays for organic network flow */
    .nd-i1 { animation-delay: 0.0s; transform-origin: 20px 30px; }
    .nd-i2 { animation-delay: 0.4s; transform-origin: 20px 50px; }
    .nd-i3 { animation-delay: 0.8s; transform-origin: 20px 70px; }

    .nd-h1 { animation-delay: 0.2s; transform-origin: 50px 20px; }
    .nd-h2 { animation-delay: 0.6s; transform-origin: 50px 40px; }
    .nd-h3 { animation-delay: 1.0s; transform-origin: 50px 60px; }
    .nd-h4 { animation-delay: 1.4s; transform-origin: 50px 80px; }

    .nd-o1 { animation-delay: 0.5s; transform-origin: 80px 38px; }
    .nd-o2 { animation-delay: 1.1s; transform-origin: 80px 62px; }
  </style>

  <!-- Background Connections -->
  <!-- Inputs to Hidden -->
  <line x1="20" y1="30" x2="50" y2="20" class="conn-line" />
  <line x1="20" y1="30" x2="50" y2="40" class="conn-line" />
  <line x1="20" y1="30" x2="50" y2="60" class="conn-line" />
  <line x1="20" y1="30" x2="50" y2="80" class="conn-line" />

  <line x1="20" y1="50" x2="50" y2="20" class="conn-line" />
  <line x1="20" y1="50" x2="50" y2="40" class="conn-line" />
  <line x1="20" y1="50" x2="50" y2="60" class="conn-line" />
  <line x1="20" y1="50" x2="50" y2="80" class="conn-line" />

  <line x1="20" y1="70" x2="50" y2="20" class="conn-line" />
  <line x1="20" y1="70" x2="50" y2="40" class="conn-line" />
  <line x1="20" y1="70" x2="50" y2="60" class="conn-line" />
  <line x1="20" y1="70" x2="50" y2="80" class="conn-line" />

  <!-- Hidden to Outputs -->
  <line x1="50" y1="20" x2="80" y2="38" class="conn-line" />
  <line x1="50" y1="20" x2="80" y2="62" class="conn-line" />

  <line x1="50" y1="40" x2="80" y2="38" class="conn-line" />
  <line x1="50" y1="40" x2="80" y2="62" class="conn-line" />

  <line x1="50" y1="60" x2="80" y2="38" class="conn-line" />
  <line x1="50" y1="60" x2="80" y2="62" class="conn-line" />

  <line x1="50" y1="80" x2="80" y2="38" class="conn-line" />
  <line x1="50" y1="80" x2="80" y2="62" class="conn-line" />

  <!-- Animated Data Flows (Traversing paths) -->
  <!-- Fast tracks -->
  <path d="M20,30 L50,20 L80,38" class="signal-flow-fast" />
  <path d="M20,70 L50,60 L80,62" class="signal-flow-fast" />
  
  <!-- Slow/staggered tracks -->
  <path d="M20,50 L50,40 L80,38" class="signal-flow-slow" />
  <path d="M20,50 L50,80 L80,62" class="signal-flow-slow" />

  <!-- Ripples/Pings (staggered) -->
  <circle cx="20" cy="30" class="ripple nd-i1" />
  <circle cx="20" cy="50" class="ripple nd-i2" />
  <circle cx="20" cy="70" class="ripple nd-i3" />

  <circle cx="50" cy="20" class="ripple nd-h1" />
  <circle cx="50" cy="40" class="ripple nd-h2" />
  <circle cx="50" cy="60" class="ripple nd-h3" />
  <circle cx="50" cy="80" class="ripple nd-h4" />

  <circle cx="80" cy="38" class="ripple nd-o1" />
  <circle cx="80" cy="62" class="ripple nd-o2" />

  <!-- Nodes (Neurons) -->
  <!-- Input Layer -->
  <circle cx="20" cy="30" r="4.5" class="node nd-i1" />
  <circle cx="20" cy="30" r="1.5" class="node-core" />

  <circle cx="20" cy="50" r="4.5" class="node nd-i2" />
  <circle cx="20" cy="50" r="1.5" class="node-core" />

  <circle cx="20" cy="70" r="4.5" class="node nd-i3" />
  <circle cx="20" cy="70" r="1.5" class="node-core" />

  <!-- Hidden Layer -->
  <circle cx="50" cy="20" r="4.5" class="node nd-h1" />
  <circle cx="50" cy="20" r="1.5" class="node-core" />

  <circle cx="50" cy="40" r="4.5" class="node nd-h2" />
  <circle cx="50" cy="40" r="1.5" class="node-core" />

  <circle cx="50" cy="60" r="4.5" class="node nd-h3" />
  <circle cx="50" cy="60" r="1.5" class="node-core" />

  <circle cx="50" cy="80" r="4.5" class="node nd-h4" />
  <circle cx="50" cy="80" r="1.5" class="node-core" />

  <!-- Output Layer -->
  <circle cx="80" cy="38" r="5" class="node nd-o1" />
  <circle cx="80" cy="38" r="1.8" class="node-core" />

  <circle cx="80" cy="62" r="5" class="node nd-o2" />
  <circle cx="80" cy="62" r="1.8" class="node-core" />
</svg>